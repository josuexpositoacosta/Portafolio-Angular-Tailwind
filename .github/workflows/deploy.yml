# GitHub Actions workflow para desplegar Angular en GitHub Pages
# Se ejecuta automáticamente cada vez que haces push a la rama main

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Permisos necesarios para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Evita deploys simultáneos
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build Angular para producción
        run: npx ng build --base-href /Portafolio-Angular-Tailwind/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/portfolio/browser

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
