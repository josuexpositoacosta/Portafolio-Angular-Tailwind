<!--
  CONCEPTOS NUEVOS DE TAILWIND:

  TIMELINE (línea temporal):
  La línea vertical se logra con un div de ancho 0.5 (w-0.5)
  posicionado absoluto que va de top-0 a bottom-0.

  Los puntos se logran con divs pequeños (w-4 h-4)
  con rounded-full (círculo) posicionados sobre la línea.

  ALTERNANCIA IZQUIERDA/DERECHA:
  Usamos $index (el índice del @for) y $odd (true si es impar)
  para alternar las cards entre izquierda y derecha en desktop.

  CLASES DINÁMICAS CON [class]:
  [class.md:pr-[52%]]="!odd" → Añade padding-right: 52% si NO es impar
  [class.md:pl-[52%]]="odd" → Añade padding-left: 52% si ES impar
  Esto crea el efecto zigzag del timeline en desktop.

  VALORES ARBITRARIOS [52%]:
  Tailwind permite valores personalizados con corchetes: pr-[52%]
  Esto es útil cuando las clases predefinidas (pr-1, pr-2...) no alcanzan.
-->

<section id="experience" class="py-24 px-4 bg-gray-800/30">
  <!-- bg-gray-800/30 → Fondo ligeramente diferente para separar visualmente esta sección -->
  <div class="max-w-5xl mx-auto">
    <h2 class="text-4xl font-bold text-center mb-4">
      <span class="bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">Experiencia Profesional</span>
    </h2>
    <div class="w-20 h-1 bg-gradient-to-r from-cyan-400 to-blue-500 mx-auto mb-16 rounded-full"></div>

    <!-- Contenedor del Timeline -->
    <div class="relative">
      <!--
        LÍNEA VERTICAL del timeline:
        absolute left-4 → En móvil, la línea está a la izquierda
        md:left-1/2 → En desktop, la línea está en el centro
        w-0.5 → Ancho de 2px
        top-0 bottom-0 → Abarca toda la altura
        bg-gradient-to-b → Gradiente de arriba hacia abajo
      -->
      <div class="absolute left-4 md:left-1/2 md:-translate-x-px top-0 bottom-0 w-0.5 bg-gradient-to-b from-cyan-400 to-blue-500"></div>

      <!--
        @for con variables locales:
        let i = $index → Índice numérico (0, 1, 2, 3...)
        let odd = $odd → true si el índice es impar (1, 3, 5...)
        Estas variables nos permiten alternar la posición de las cards.
      -->
      @for (exp of experiences; track exp.company; let i = $index; let odd = $odd) {
        <div class="relative mb-12 md:mb-16"
             [class.md:pr-[52%]]="!odd"
             [class.md:pl-[52%]]="odd">

          <!--
            PUNTO del timeline:
            w-4 h-4 → 16x16px
            -translate-x-1/2 → Centrado sobre la línea
            bg-cyan-400 → Color cyan sólido
            rounded-full → Círculo perfecto
            border-4 border-gray-900 → Borde grueso del color del fondo (efecto "hueco")
            z-10 → Por encima de la línea
          -->
          <div class="absolute left-4 md:left-1/2 w-4 h-4 -translate-x-1/2 bg-cyan-400 rounded-full border-4 border-gray-900 z-10 top-6"></div>

          <!-- CARD de experiencia -->
          <div class="ml-12 md:ml-0 bg-gray-800/80 border border-gray-700/50 rounded-xl p-6 hover:border-cyan-400/30 transition-all duration-300 hover:shadow-lg hover:shadow-cyan-400/5">

            <!-- Badge con período -->
            <span class="inline-block px-3 py-1 bg-cyan-400/10 text-cyan-400 text-xs font-mono rounded-full mb-3">
              {{ exp.period }}
            </span>

            <h3 class="text-xl font-bold text-white mb-1">{{ exp.title }}</h3>
            <h4 class="text-cyan-400 font-medium mb-3">{{ exp.company }}</h4>
            <p class="text-gray-400 text-sm mb-4 leading-relaxed">{{ exp.description }}</p>

            <!--
              @for anidado: Itera sobre exp.stack para mostrar
              cada tecnología como una "pill" (pastilla/badge)
              flex-wrap → Si no caben en una línea, bajan a la siguiente
            -->
            <div class="flex flex-wrap gap-2 mb-4">
              @for (tech of exp.stack; track tech) {
                <span class="px-2 py-1 bg-gray-700/50 text-gray-300 text-xs rounded-md font-mono">{{ tech }}</span>
              }
            </div>

            <!-- Logro destacado -->
            <div class="flex items-start gap-2 bg-cyan-400/5 rounded-lg p-3">
              <span class="text-cyan-400 text-sm">🏆</span>
              <p class="text-cyan-300 text-sm">{{ exp.achievement }}</p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
